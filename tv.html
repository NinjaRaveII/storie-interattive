<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storie Interattive ✦ TV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;
  --gold:#c9a84c;--gold2:#e8c96b;
  --text:#f0ead6;--muted:#8a8070;--accent:#4a90a4;
  --radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
#app{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 40px 24px;overflow:hidden}

/* ===== HOME: MAPPA DEL MONDO ===== */
#screen-list{
  width:100%;max-width:1400px;
  animation:fadeIn .6s ease;
  display:flex;flex-direction:column;
  align-items:center;
  height:100%;
}
.header-title{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,52px);font-weight:700;color:var(--gold2);text-align:center;margin-bottom:4px;letter-spacing:2px}
.header-sub{text-align:center;color:var(--muted);font-size:clamp(13px,1.5vw,20px);font-weight:300;font-style:italic;margin-bottom:20px}

/* mappa SVG wrapper */
#world-map-wrap{
  width:100%;flex:1;
  display:flex;align-items:center;justify-content:center;
  position:relative;min-height:0;
}
#world-map{width:100%;height:100%;max-height:calc(100vh - 180px)}

/* tooltip sulla mappa */
#map-tooltip{
  position:absolute;
  background:rgba(18,18,26,.96);
  border:1px solid rgba(201,168,76,.35);
  border-radius:12px;padding:12px 18px;
  pointer-events:none;opacity:0;
  transition:opacity .2s;z-index:50;
  text-align:center;min-width:160px;
}
#map-tooltip.show{opacity:1}
#map-tooltip .tt-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold2);margin-bottom:4px}
#map-tooltip .tt-count{font-size:13px;color:var(--muted);font-style:italic}

/* ===== SCHERMATA REGNO (lista storie del regno) ===== */
#screen-realm{
  display:none;width:100%;max-width:900px;
  animation:fadeIn .5s ease;
  margin:auto 0;
}
.realm-header{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.realm-icon-big{font-size:52px;line-height:1}
.realm-name{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,48px);color:var(--gold2)}
.realm-desc{font-size:clamp(13px,1.5vw,18px);color:var(--muted);font-style:italic;margin-top:4px}
.realm-stories{display:flex;flex-direction:column;gap:14px}

.story-card{background:var(--card);border:1px solid rgba(201,168,76,.2);border-radius:var(--radius);padding:22px 28px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;display:flex;align-items:center;gap:20px}
.story-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.06),transparent);opacity:0;transition:opacity .3s}
.story-card:hover{border-color:var(--gold);transform:translateX(6px);box-shadow:0 12px 40px rgba(201,168,76,.1)}
.story-card:hover::before{opacity:1}
.story-card-icon{font-size:36px;flex-shrink:0}
.story-card-body{flex:1}
.story-tag{display:inline-block;background:rgba(201,168,76,.12);color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:2px 9px;border-radius:20px;margin-bottom:8px}
.story-title{font-family:'Playfair Display',serif;font-size:clamp(18px,2vw,26px);font-weight:700;margin-bottom:6px;color:var(--text)}
.story-desc{color:var(--muted);font-size:clamp(13px,1.3vw,17px);line-height:1.5;font-style:italic}
.story-arrow{font-size:22px;color:var(--gold);opacity:.35;transition:all .3s;flex-shrink:0}
.story-card:hover .story-arrow{opacity:1;transform:translateX(4px)}

/* regno vuoto */
.realm-empty{
  text-align:center;padding:48px 24px;
  color:var(--muted);font-style:italic;font-size:clamp(15px,1.6vw,20px);
}
.realm-empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}

/* regioni mappa hover */
.map-region{cursor:pointer;transition:filter .2s, opacity .2s}
.map-region:hover{filter:brightness(1.35)}
.map-region.locked{cursor:default;opacity:.55}
.map-region.locked:hover{filter:none}

/* STORY */
#screen-story{display:none;width:100%;max-width:1300px;animation:fadeIn .7s ease}
.progress-bar{width:100%;height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:14px;flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .9s ease}

/* immagine full-width con sottotitoli sovrapposti */
.scene-img-block{
  position:relative;width:100%;
  border-radius:20px;overflow:hidden;
  background:var(--surface);
  height:clamp(200px,42vh,420px);
  flex-shrink:0;
}
.scene-img-block img{width:100%;height:100%;object-fit:cover;display:block}
.img-loading{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:14px;font-style:italic;
}

/* gradiente scuro in basso per leggibilità sottotitoli */
.scene-img-block::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(transparent, rgba(5,5,10,.92));
  pointer-events:none;
}

/* SOTTOTITOLI — frase intera con fade */
.subtitle-text{
  font-family:'Crimson Pro',serif;
  font-size:clamp(18px,2.2vw,30px);
  font-style:italic;
  font-weight:300;
  color:#fff;
  line-height:1.5;
  text-shadow:0 2px 14px rgba(0,0,0,.9),0 1px 4px rgba(0,0,0,1);
  transition:opacity 0.3s ease;
}

/* etichetta fase + indicatore voce */
.scene-meta{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;margin-top:14px;
  flex-shrink:0;
}
.scene-label-pill{
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);background:rgba(201,168,76,.1);
  border:1px solid rgba(201,168,76,.2);
  padding:4px 12px;border-radius:20px;
}
.speak-ind{display:inline-flex;align-items:center;gap:5px;color:var(--gold);font-size:12px;opacity:0;transition:opacity .3s}
.speak-ind.on{opacity:1}
.speak-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);animation:sdot 1s ease-in-out infinite}
.speak-dot:nth-child(2){animation-delay:.18s}.speak-dot:nth-child(3){animation-delay:.36s}
@keyframes sdot{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)}}

/* SCELTE — sotto l'immagine, sempre visibili */
.choices-block{
  margin-top:12px;flex-shrink:0;
}
.choices-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.14);
  border-radius:10px;padding:12px 18px;text-align:left;cursor:pointer;
  color:var(--text);font-family:'Crimson Pro',serif;
  font-size:clamp(14px,1.5vw,20px);
  transition:all .2s;display:flex;align-items:center;gap:12px;
}
.choice-btn .cnum{min-width:28px;height:28px;border-radius:50%;border:1px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gold);flex-shrink:0}
.choice-btn:hover,.choice-btn.focused{background:rgba(201,168,76,.09);border-color:var(--gold);transform:translateX(6px)}

/* MORAL CARD */
.moral-card{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:18px 22px;margin-bottom:24px;display:none}
.moral-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.moral-text{font-size:clamp(15px,1.6vw,20px);color:var(--text);font-style:italic;line-height:1.6}

/* END */
#screen-end{display:none;text-align:center;animation:fadeIn .8s ease;max-width:700px}
.end-icon{font-size:72px;margin-bottom:28px}
.end-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,52px);color:var(--gold2);margin-bottom:12px}
.end-sub{font-size:clamp(15px,1.8vw,21px);color:var(--muted);font-style:italic;margin-bottom:36px}
.btn-restart{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Crimson Pro',serif;font-size:19px;padding:14px 44px;border-radius:40px;cursor:pointer;transition:all .3s;letter-spacing:1px}
.btn-restart:hover{background:rgba(201,168,76,.1);transform:scale(1.03)}

/* QR PANEL */
#qr-panel{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(18,18,26,.97);
  border:1px solid rgba(201,168,76,.3);
  border-radius:20px;padding:32px 36px;
  display:none;flex-direction:column;align-items:center;gap:16px;
  z-index:200;text-align:center;
}
#qr-panel h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold2)}
#qr-panel p{font-size:14px;color:var(--muted);line-height:1.5;max-width:280px}
#qr-img{border-radius:10px;border:2px solid rgba(201,168,76,.3)}
#qr-url{font-size:11px;color:var(--muted);font-family:monospace;margin-top:-8px}
.qr-dismiss{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--muted);font-family:'Crimson Pro',serif;font-size:14px;padding:8px 20px;border-radius:20px;cursor:pointer;margin-top:4px}
.qr-dismiss:hover{border-color:var(--gold);color:var(--gold)}
.ctrl-badge{position:fixed;bottom:20px;right:20px;background:rgba(18,18,26,.92);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:10px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;z-index:100}
.ctrl-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:cdot 2s infinite}
@keyframes cdot{0%,100%{opacity:1}50%{opacity:.2}}

/* PULSANTE HOME FISSO */
#btn-home{
  position:fixed;top:20px;left:24px;z-index:150;
  background:rgba(18,18,26,.88);
  border:1px solid rgba(201,168,76,.25);
  border-radius:30px;
  padding:9px 18px 9px 14px;
  color:var(--gold);
  font-family:'Crimson Pro',serif;
  font-size:15px;
  cursor:pointer;
  display:none;
  align-items:center;gap:8px;
  transition:all .2s;
  backdrop-filter:blur(4px);
}
#btn-home:hover{background:rgba(201,168,76,.15);border-color:var(--gold);transform:scale(1.03)}
#btn-home.visible{display:flex}

@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- PULSANTE HOME SEMPRE VISIBILE durante la storia -->
<button id="btn-home" onclick="goHome()">← Home</button>

<div id="app">

  <div id="screen-list">
    <h1 class="header-title">✦ Il Mondo delle Storie ✦</h1>
    <p class="header-sub">Scegli un regno e parti per l'avventura</p>
    <div id="world-map-wrap">
      <!-- SVG mappa generata da JS -->
      <div id="map-tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-count" id="tt-count"></div></div>
    </div>
  </div>

  <!-- SCHERMATA REGNO -->
  <div id="screen-realm">
    <div class="realm-header">
      <div class="realm-icon-big" id="realm-icon"></div>
      <div>
        <div class="realm-name" id="realm-name"></div>
        <div class="realm-desc" id="realm-desc"></div>
      </div>
    </div>
    <div class="realm-stories" id="realm-stories"></div>
  </div>

  <div id="screen-story">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>

    <!-- immagine full-width con sottotitoli sovrapposti -->
    <div class="scene-img-block" id="scene-img-block">
      <div class="img-loading" id="img-loading">Caricamento scena…</div>
      <div class="subtitle-bar">
        <p class="subtitle-text" id="subtitle-text"></p>
      </div>
    </div>

    <!-- etichetta fase + indicatore voce -->
    <div class="scene-meta">
      <span class="scene-label-pill" id="scene-label">Inizio</span>
      <span class="speak-ind" id="speak-ind">
        <span class="speak-dot"></span><span class="speak-dot"></span><span class="speak-dot"></span>
        in lettura…
      </span>
    </div>

    <!-- morale (finale) -->
    <div class="moral-card" id="moral-card" style="display:none">
      <div class="moral-label">✦ La morale di questa storia</div>
      <div class="moral-text" id="moral-text"></div>
    </div>

    <!-- scelte — sempre sotto, sempre visibili -->
    <div class="choices-block" id="choices-wrap" style="display:none">
      <p class="choices-title">Cosa succede adesso?</p>
      <div class="choices" id="choices"></div>
    </div>
  </div>

  <div id="screen-end">
    <div class="end-icon">🌟</div>
    <h2 class="end-title">Fine della storia!</h2>
    <p class="end-sub">Che bella avventura insieme</p>
    <button class="btn-restart" onclick="restart()">↩ Torna alle storie</button>
  </div>
</div>

<!-- QR CODE PANEL -->
<div id="qr-panel">
  <h3>📱 Controller</h3>
  <p>Inquadra il QR con il telefono per usarlo come telecomando</p>
  <img id="qr-img" width="160" height="160" alt="QR controller">
  <div id="qr-url"></div>
  <button class="qr-dismiss" onclick="document.getElementById('qr-panel').style.display='none'">Ho scansionato il QR ✓</button>
</div>

<div class="ctrl-badge" onclick="showQR()" style="cursor:pointer" title="Mostra QR controller">
  <div class="ctrl-dot" id="ctrl-dot"></div>
  <span id="ctrl-text">📱 Controller</span>
</div>

<script>
/* ===================== DATI STORIE ===================== */
const STORIES = [
  /* ---- 1. L'OASI DELLE SABBIE DORATE ---- */
  {
    id:'oasis', tag:'Avventura · bambini', icon:'🌵',
    title:'L\'Oasi delle Sabbie Dorate',
    desc:'Una bambina scopre che la fonte del suo villaggio è sparita, e parte a cercarla tra le dune.',
    steps:[
      {
        type:'intro', label:'L\'inizio',
        text:'Nel villaggio di sabbia dorata viveva Sara, che ogni mattina riempiva la brocca alla fonte dell\'oasi. Ma quel giorno l\'acqua non c\'era più: solo un piccolo pesce d\'argento la guardava con occhi tristi, immobile sulla sabbia secca. "Aiutami a ritrovare la sorgente," sussurrò il pesce, "e l\'oasi tornerà a vivere." Sara non ci pensò due volte: si mise lo zaino in spalla e uscì tra le dune dorate.',
        keyword:'desert oasis child golden sand adventure',
        choices:[
          {text:'Seguire le dune verso il tramonto', key:'dune'},
          {text:'Chiedere consiglio al vecchio cammelliere Yusuf', key:'camel'},
          {text:'Ascoltare il canto del vento tra le rocce', key:'wind'}
        ]
      },
      {
        type:'middle', label:'Il cuore della storia',
        variants:{
          dune:{
            text:'Le dune la portarono fino a un arco di pietra antica, coperto di incisioni scintillanti. Ai suoi piedi, una piccola volpe color sabbia dorata la osservava con occhi d\'ambra. "Sono Sabbiosa," disse la volpe, "la guardiana di questo arco. Il vento ha sepolto l\'ingresso della sorgente, e da sola non riesco a liberarlo."',
            keyword:'golden sand fox stone arch desert magical',
            choices:[
              {text:'Scavare insieme con le mani', key:'dig'},
              {text:'Chiederle di raccontare la leggenda della fonte', key:'legend'},
              {text:'Offrirle l\'acqua rimasta nella borraccia', key:'water'}
            ]
          },
          camel:{
            text:'Il vecchio Yusuf sedeva all\'ombra della sua tenda, accanto al suo cammello Vento. Ascoltò la storia di Sara con gli occhi socchiusi. "Anch\'io ho visto quella fonte prosciugarsi, quando ero bambino come te," disse infine. "Ma so che è tornata a scorrere una volta. Bisogna solo ricordare come."',
            keyword:'old man camel desert tent storyteller warm light',
            choices:[
              {text:'Chiedergli di raccontare cosa ricorda', key:'memory'},
              {text:'Chiedere la vecchia mappa del pozzo', key:'map'},
              {text:'Chiedergli di accompagnarla', key:'together'}
            ]
          },
          wind:{
            text:'Tra le rocce, il vento sembrava intonare una melodia. Da un turbine di sabbia dorata prese forma Zefira, un uccello fatto di luce e polvere scintillante. "Ti ho sentita arrivare da lontano," disse. "Sali sul mio dorso: da qui in alto tutto si vede meglio."',
            keyword:'shimmering light bird desert wind spirit golden dust',
            choices:[
              {text:'Cantare insieme al vento', key:'sing'},
              {text:'Chiederle della sua famiglia', key:'family'},
              {text:'Chiederle di volare più in alto per guardare dal cielo', key:'sky'}
            ]
          }
        }
      },
      {
        type:'end', label:'Il finale',
        ends:{
          dune_dig:{text:'Sara e Sabbiosa scavarono insieme, i granelli dorati che scivolavano come polvere di stelle. Sotto le loro mani apparvero antiche piastrelle blu, e poi l\'acqua, calda e limpida, che risalì gorgogliando. L\'oasi si risvegliò tutta insieme, e Sabbiosa le si strofinò contro la gamba, felice.', moral:'Le mani che lavorano insieme spostano anche le montagne di sabbia.', keyword:'child fox digging spring water desert oasis blooming'},
          dune_legend:{text:'Sabbiosa raccontò la leggenda: la sorgente torna a scorrere solo per chi sa ascoltare fino in fondo, senza fretta. Sara si sedette e ascoltò ogni parola con il cuore aperto. Quando la volpe finì di parlare, un filo d\'acqua sgorgò lentamente dalla roccia, come se la sabbia avesse solo aspettato qualcuno pronto ad ascoltare.', moral:'Chi ascolta con pazienza trova risposte che la fretta nasconde.', keyword:'child fox listening ancient legend desert stone arch'},
          dune_water:{text:'Sara porse a Sabbiosa l\'ultima acqua della sua borraccia, senza pensarci due volte. Commossa, la volpe scavò con le zampe un varco nascosto sotto l\'arco, rivelando la sorgente segreta. "Chi dona anche l\'ultima goccia," disse Sabbiosa, "merita di trovarne un fiume intero."', moral:'La generosità vera trova sempre il modo di essere ripagata.', keyword:'child sharing water fox desert generosity golden light'},
          camel_memory:{text:'Yusuf chiuse gli occhi e lasciò riaffiorare un ricordo lontano: da bambino aveva visto suo padre inginocchiarsi tra due palme gemelle e cantare piano. Sara lo seguì fino a quelle stesse palme, si inginocchiò, e cantò. La sabbia tremò, e la sorgente tornò a scorrere come cent\'anni prima.', moral:'I ricordi degli anziani sono mappe verso ciò che credevamo perduto.', keyword:'old man memory twin palm trees desert spring returning'},
          camel_map:{text:'Yusuf tirò fuori da un baule una mappa ingiallita, disegnata da suo nonno. Seguendola tra le dune, Sara trovò due rocce gemelle proprio come indicato, e sotto di esse un pozzo coperto di sabbia. Con un ultimo colpo di vento, la sabbia si aprì e l\'acqua tornò a brillare.', moral:'Le conoscenze tramandate ci guidano anche quando la strada sembra scomparsa.', keyword:'old map desert twin rocks hidden well discovery'},
          camel_together:{text:'Yusuf e il suo cammello Vento accompagnarono Sara per tutto il viaggio, portando in groppa gli otri vuoti. Quando finalmente trovarono la sorgente, la riempirono tutti insieme, ridendo per la fatica e la gioia. Tornarono al villaggio in tre, con l\'acqua che scintillava sotto il sole.', moral:'Il cammino più lungo si accorcia quando lo si percorre in compagnia.', keyword:'old man camel child desert journey together water'},
          wind_sing:{text:'Sara cantò insieme a Zefira, e le loro voci si intrecciarono nel vento come un unico canto dorato. La melodia scivolò tra le rocce fino a un\'antica crepa sigillata, che si spezzò dolcemente lasciando scorrere l\'acqua. "La musica apre porte che la forza non troverebbe mai," disse Zefira sorridendo di luce.', moral:'Un canto sincero può aprire varchi che nessuna forza saprebbe trovare.', keyword:'child singing light bird desert crack rock water flowing'},
          wind_family:{text:'Zefira raccontò di essere l\'ultima di una lunga stirpe di spiriti del vento, custodi dell\'oasi da generazioni. "Quando la mia famiglia se ne andò, nessuno rimase a cantare alla sorgente," disse con tristezza dolce. Sara le promise che sarebbe tornata spesso a cantare con lei, e la sorgente, sentendosi di nuovo custodita, ricominciò a scorrere.', moral:'Le cose importanti fioriscono quando qualcuno promette di prendersene cura.', keyword:'light bird child desert promise ancestral spring golden'},
          wind_sky:{text:'Zefira volò altissima sopra le dune, e da lassù Sara vide una macchia verde scura nascosta in una valle che da terra nessuno poteva scorgere. Scesero insieme, e lì, protetta dalle rocce, trovarono la sorgente intatta, che aspettava solo di essere ritrovata dall\'alto.', moral:'A volte basta un nuovo punto di vista per ritrovare ciò che sembrava perduto.', keyword:'child flying light bird desert view hidden valley spring'}
        }
      }
    ]
  },

  /* ---- 2. LA CAMPANA D'ORO DEL VILLAGGIO ---- */
  {
    id:'bell', tag:'Fiaba · bambini', icon:'🏰',
    title:'La Campana d\'Oro del Villaggio',
    desc:'Un bambino scopre che la campana dorata del castello ha smesso di suonare, e cerca di farla tornare a cantare.',
    steps:[

/* ===================== MAPPA SVG ===================== */
function buildMap(){
  const wrap = document.getElementById('world-map-wrap');
  const tooltip = document.getElementById('map-tooltip');

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 900 560');
  svg.setAttribute('id','world-map');
  svg.style.cssText='width:100%;height:100%;max-height:calc(100vh - 180px);filter:drop-shadow(0 0 40px rgba(201,168,76,.08))';

  /* sfondo oceano */
  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('width','900');bg.setAttribute('height','560');
  bg.setAttribute('fill','#070d1a');bg.setAttribute('rx','20');
  svg.appendChild(bg);

  /* griglia decorativa */
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(201,168,76,.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  `;
  svg.appendChild(defs);
  const gridRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  gridRect.setAttribute('width','900');gridRect.setAttribute('height','560');
  gridRect.setAttribute('fill','url(#grid)');svg.appendChild(gridRect);

  REALMS.forEach(realm => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('map-region');
    if(!realm.storyIds.length) g.classList.add('locked');

    /* forma della regione */
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', realm.shape);
    path.setAttribute('fill', realm.color);
    path.setAttribute('stroke', realm.colorLight);
    path.setAttribute('stroke-width','1.5');
    g.appendChild(path);

    /* texture puntini interni */
    for(let i=0;i<6;i++){
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', realm.labelX + (Math.random()*80-40));
      dot.setAttribute('cy', realm.labelY + (Math.random()*60-30));
      dot.setAttribute('r','1.5');
      dot.setAttribute('fill', realm.colorLight);
      dot.setAttribute('opacity','0.3');
      g.appendChild(dot);
    }

    /* icona + nome */
    const fo = document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
    fo.setAttribute('x', realm.labelX - 60);
    fo.setAttribute('y', realm.labelY - 40);
    fo.setAttribute('width','120');
    fo.setAttribute('height','80');
    fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="text-align:center;pointer-events:none">
      <div style="font-size:26px;line-height:1.2">${realm.icon}</div>
      <div style="font-family:'Playfair Display',serif;font-size:11px;color:${realm.colorLight};letter-spacing:1px;line-height:1.3;margin-top:2px">${realm.name}</div>
      ${realm.storyIds.length ? `<div style="font-size:9px;color:rgba(201,168,76,.6);margin-top:2px">${realm.storyIds.length} stor${realm.storyIds.length>1?'ie':'ia'}</div>` : '<div style="font-size:9px;color:rgba(255,255,255,.25);margin-top:2px">Presto…</div>'}
    </div>`;
    g.appendChild(fo);

    /* interazione */
    if(realm.storyIds.length){
      g.addEventListener('click', ()=>openRealm(realm.id));
      g.addEventListener('mouseenter', (e)=>{
        const r = svg.getBoundingClientRect();
        const x = realm.labelX / 900 * r.width + r.left;
        const y = realm.labelY / 560 * r.height + r.top;
        document.getElementById('tt-name').textContent = realm.name;
        document.getElementById('tt-count').textContent = `${realm.storyIds.length} storia disponibile`;
        tooltip.style.left = (x - tooltip.offsetWidth/2) + 'px';
        tooltip.style.top = (y - 90) + 'px';
        tooltip.classList.add('show');
      });
      g.addEventListener('mouseleave', ()=>tooltip.classList.remove('show'));
    }

    svg.appendChild(g);
  });

  /* bordi decorativi della mappa */
  const border = document.createElementNS('http://www.w3.org/2000/svg','rect');
  border.setAttribute('width','898');border.setAttribute('height','558');
  border.setAttribute('x','1');border.setAttribute('y','1');
  border.setAttribute('fill','none');
  border.setAttribute('stroke','rgba(201,168,76,.15)');
  border.setAttribute('stroke-width','1');
  border.setAttribute('rx','20');
  svg.appendChild(border);

  wrap.appendChild(svg);
}

/* ===================== APERTURA REGNO ===================== */
function openRealm(realmId){
  const realm = REALMS.find(r=>r.id===realmId);
  document.getElementById('realm-icon').textContent = realm.icon;
  document.getElementById('realm-name').textContent = realm.name;
  document.getElementById('realm-desc').textContent = realm.desc;

  const container = document.getElementById('realm-stories');
  if(!realm.storyIds.length){
    container.innerHTML = `<div class="realm-empty"><div class="realm-empty-icon">${realm.icon}</div>Questo regno non ha ancora storie.<br>Torna presto per nuove avventure…</div>`;
  } else {
    container.innerHTML = realm.storyIds.map(sid=>{
      const s = STORIES.find(x=>x.id===sid);
      if(!s) return '';
      return `<div class="story-card" onclick="startStory('${s.id}')">
        <div class="story-card-icon">${s.icon}</div>
        <div class="story-card-body">
          <span class="story-tag">${s.tag}</span>
          <h3 class="story-title">${s.title}</h3>
          <p class="story-desc">${s.desc}</p>
        </div>
        <span class="story-arrow">→</span>
      </div>`;
    }).join('');
  }
  show('screen-realm');
}

/* ===================== STORIA ===================== */
function startStory(id){
  story=STORIES.find(s=>s.id===id);
  stepIdx=0;choice1=null;choice2=null;
  show('screen-story');
  renderStep();
}

function renderStep(){
  const step=story.steps[stepIdx];
  document.getElementById('prog').style.width=(stepIdx/story.steps.length*100)+'%';
  document.getElementById('moral-card').style.display='none';
  document.getElementById('choices-wrap').style.display='none';

  if(step.type==='intro'){
    setLabel(step.label);
    loadImg(imgPath(story.id,'intro',null));
    speak(step.text, ()=>showChoices(step.choices));

  } else if(step.type==='middle'){
    const v=step.variants[choice1]||step.variants[Object.keys(step.variants)[0]];
    setLabel(step.label);
    loadImg(imgPath(story.id,'middle',choice1));
    speak(v.text, ()=>showChoices(v.choices));

  } else {
    /* END */
    const key=choice1+'_'+choice2;
    const e=step.ends[key]||step.ends[Object.keys(step.ends)[0]];
    setLabel(step.label);
    loadImg(imgPath(story.id,'end',null));
    speak(e.text, ()=>{
      document.getElementById('prog').style.width='100%';
      document.getElementById('moral-text').textContent=e.moral||'';
      if(e.moral) document.getElementById('moral-card').style.display='block';
      setTimeout(showEnd, 6000);
    });
  }
}

function setLabel(lbl){
  document.getElementById('scene-label').textContent=lbl;
}

function showChoices(choices){
  const cc=document.getElementById('choices');
  cc.innerHTML=choices.map((c,i)=>`
    <button class="choice-btn" onclick="pick('${c.key}',${stepIdx})">
      <span class="cnum">${i+1}</span><span>${c.text}</span>
    </button>`).join('');
  document.getElementById('choices-wrap').style.display='block';
}

function pick(key,si){
  if(si===0) choice1=key; else choice2=key;
  document.getElementById('choices-wrap').style.display='none';
  stepIdx++;
  if(stepIdx<story.steps.length) setTimeout(renderStep,350);
}

function showEnd(){
  stopSpeak();
  show('screen-end');
}

function restart(){
  stopSpeak();
  const lastId = story?.id;
  story=null;choice1=null;choice2=null;stepIdx=0;
  const realm = REALMS.find(r=>r.storyIds.includes(lastId||''));
  if(realm) openRealm(realm.id);
  else show('screen-list');
}

/* ===================== IMMAGINI LOCALI =====================
   Struttura attesa nella cartella images/:
   images/forest/intro.jpg
   images/forest/middle_deep.jpg   (ramo scelta 1)
   images/forest/middle_wait.jpg   (ramo scelta 2)
   images/forest/middle_run.jpg    (ramo scelta 3)
   images/forest/end.jpg
   images/sea/intro.jpg  ... (stessa struttura)
   images/mountain/intro.jpg ...
   ======================================================== */

function imgPath(storyId, type, variant){
  /* type = 'intro' | 'middle' | 'end'
     variant = chiave scelta (es. 'deep') oppure null */
  const base = `images/${storyId}/`;
  if(type==='intro') return base+'intro.jpg';
  if(type==='end')   return base+'end.jpg';
  if(type==='middle' && variant) return base+`middle_${variant}.jpg`;
  return base+'intro.jpg';
}

function loadImg(path){
  const block = document.getElementById('scene-img-block');
  const old = block.querySelector('img'); if(old) old.remove();
  const loading = document.getElementById('img-loading');
  loading.style.display='flex';
  loading.textContent='Caricamento scena…';

  const img = new Image();
  img.src = path;
  img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;transition:opacity .5s';
  img.style.opacity = '0';
  img.onload = ()=>{
    loading.style.display='none';
    block.insertBefore(img, block.firstChild);
    requestAnimationFrame(()=>{ img.style.opacity='1'; });
  };
  img.onerror = ()=>{
    /* immagine non trovata: mostra placeholder con nome file */
    loading.textContent = '🖼 ' + path;
  };
}

/* ===================== VOCE — ElevenLabs TTS =====================
   1. Vai su elevenlabs.io → crea account gratuito
   2. Profile → API Key → copia e incolla sotto
   3. Voce consigliata: "Serena" o lascia il default italiano
   ================================================================ */
const ELEVENLABS_KEY    = '';
/* ID voce italiana su ElevenLabs.
   Default: "Serena" (voce femminile italiana naturale).
   Puoi trovare altri ID su elevenlabs.io/voice-library cercando "Italian" */
const ELEVENLABS_VOICE  = 'pFZP5JQG7iQjIQuC4Bku'; /* Serena — Italian */

let currentAudio = null;

function splitSentences(text){
  return text.match(/[^.!?]+[.!?]*/g) || [text];
}

async function speak(text, cb){
  stopSpeak();
  document.getElementById('speak-ind').classList.add('on');

  const hasKey = !!ELEVENLABS_KEY;

  if(hasKey){
    await speakElevenLabs(text, cb);
  } else {
    /* fallback Web Speech finché non si inserisce la chiave */
    speakFallback(text, cb);
  }
}

async function speakElevenLabs(text, cb){
  const sentences = splitSentences(text);
  const sub = document.getElementById('subtitle-text');

  for(let i=0; i<sentences.length; i++){
    const s = sentences[i].trim();
    if(!s) continue;

    /* sottotitolo: fade out → cambia testo → fade in */
    sub.style.transition='opacity .25s';
    sub.style.opacity='0';
    await wait(260);
    sub.textContent = s;
    sub.style.opacity='1';

    try{
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE}/stream`, {
        method:'POST',
        headers:{
          'xi-api-key': ELEVENLABS_KEY,
          'Content-Type':'application/json'
        },
        body: JSON.stringify({
          text: s,
          model_id: 'eleven_multilingual_v2',
          voice_settings:{ stability:0.45, similarity_boost:0.82, style:0.3, use_speaker_boost:true }
        })
      });
      if(!res.ok) throw new Error('ElevenLabs error '+res.status);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      await playAudio(url);
      URL.revokeObjectURL(url);
    } catch(e){
      /* se la chiamata fallisce (quota esaurita, ecc.) cade sul fallback */
      await new Promise(res=>wsSentence(s, res));
    }
  }

  document.getElementById('speak-ind').classList.remove('on');
  if(cb) cb();
}

function playAudio(url){
  return new Promise(resolve=>{
    const a = new Audio(url);
    currentAudio = a;
    a.onended  = resolve;
    a.onerror  = resolve; /* non bloccare se errore */
    a.play().catch(resolve);
  });
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* Web Speech fallback (per uso senza chiave ElevenLabs) */
function speakFallback(text, cb){
  const sentences = splitSentences(text);
  const sub = document.getElementById('subtitle-text');
  let i = 0;
  function next(){
    if(i>=sentences.length){
      document.getElementById('speak-ind').classList.remove('on');
      if(cb)cb(); return;
    }
    const s=sentences[i].trim(); if(!s){i++;next();return;}
    sub.style.opacity='0';
    setTimeout(()=>{ sub.textContent=s; sub.style.opacity='1'; },200);
    wsSentence(s,()=>{ i++; next(); });
  }
  next();
}

function wsSentence(text, cb){
  const synth = window.speechSynthesis;
  if(!synth){if(cb)cb();return;}
  const u = new SpeechSynthesisUtterance(text);
  u.lang='it-IT'; u.rate=0.82; u.pitch=1.0;
  const vs=synth.getVoices();
  const v=vs.find(x=>x.name.includes('Google')&&x.lang.startsWith('it'))
    ||vs.find(x=>x.lang==='it-IT')||vs.find(x=>x.lang.startsWith('it'));
  if(v)u.voice=v;
  u.onend=cb; u.onerror=cb;
  synth.speak(u);
}

function stopSpeak(){
  if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('speak-ind').classList.remove('on');
  const sub=document.getElementById('subtitle-text');
  if(sub){sub.textContent='';sub.style.opacity='1';}
}

/* ===================== QR CODE controller ===================== */
function showQR(){
  /* Genera QR che punta a controller.html nella stessa cartella */
  const base=window.location.href.replace('tv.html','');
  const ctrlUrl=base+'controller.html';
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(ctrlUrl)}&bgcolor=12121a&color=c9a84c&margin=10`;
  document.getElementById('qr-img').src=qrUrl;
  document.getElementById('qr-url').textContent=ctrlUrl.length>50?ctrlUrl.slice(0,50)+'…':ctrlUrl;
  document.getElementById('qr-panel').style.display='flex';
}

/* ===================== CONTROLLER via BroadcastChannel ===================== */
let bc;
try{
  bc=new BroadcastChannel('storie-interattive');
  bc.onmessage=(e)=>{
    const d=e.data;
    if(d.action==='start') startStory(d.id);
    if(d.action==='pick') pick(d.key,d.si);
    if(d.action==='restart') restart();
    document.getElementById('ctrl-text').textContent='Controller attivo ✓';
    document.getElementById('ctrl-dot').style.background='#4caf50';
    document.getElementById('qr-panel').style.display='none';
  };
}catch(err){}

function show(id){
  ['screen-list','screen-realm','screen-story','screen-end'].forEach(s=>{
    const el=document.getElementById(s);
    if(el) el.style.display = s===id ? 'block' : 'none';
  });
  const btn = document.getElementById('btn-home');
  btn.classList.toggle('visible', id!=='screen-list');
  /* mostra/nascondi anche screen-realm nel btn-home */
  if(id==='screen-realm'){
    btn.textContent='← Mappa';
    btn.onclick=()=>{ stopSpeak(); show('screen-list'); };
  } else {
    btn.textContent='← Home';
    btn.onclick=goHome;
  }
}

function goHome(){
  stopSpeak();
  story=null; choice1=null; choice2=null; stepIdx=0;
  show('screen-list');
}

makeStars();
buildMap();
show('screen-list');
showQR();
</script>
