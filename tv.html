<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storie Interattive ✦ TV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;
  --gold:#c9a84c;--gold2:#e8c96b;
  --text:#f0ead6;--muted:#8a8070;--accent:#4a90a4;
  --radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
#app{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}

/* LIST */
#screen-list{width:100%;max-width:1400px;animation:fadeIn .6s ease}
.header-title{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,68px);font-weight:700;color:var(--gold2);text-align:center;margin-bottom:10px;letter-spacing:2px}
.header-sub{text-align:center;color:var(--muted);font-size:clamp(16px,2vw,24px);font-weight:300;font-style:italic;margin-bottom:52px}
.stories-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;width:100%}
.story-card{background:var(--card);border:1px solid rgba(201,168,76,.2);border-radius:var(--radius);padding:28px 32px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.story-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.06),transparent);opacity:0;transition:opacity .3s}
.story-card:hover,.story-card.focused{border-color:var(--gold);transform:translateY(-5px);box-shadow:0 24px 64px rgba(201,168,76,.12)}
.story-card:hover::before,.story-card.focused::before{opacity:1}
.story-icon{font-size:40px;margin-bottom:12px;display:block}
.story-tag{display:inline-block;background:rgba(201,168,76,.12);color:var(--gold);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:14px}
.story-title{font-family:'Playfair Display',serif;font-size:clamp(20px,2.2vw,30px);font-weight:700;margin-bottom:10px;color:var(--text)}
.story-desc{color:var(--muted);font-size:clamp(14px,1.4vw,18px);line-height:1.6;font-style:italic}
.story-arrow{position:absolute;bottom:22px;right:22px;color:var(--gold);opacity:.35;font-size:24px;transition:all .3s}
.story-card:hover .story-arrow,.story-card.focused .story-arrow{opacity:1;transform:translateX(5px)}

/* STORY */
#screen-story{display:none;width:100%;max-width:1200px;animation:fadeIn .7s ease}
.progress-bar{width:100%;height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .9s ease}
.scene-container{border-radius:24px;overflow:hidden;background:var(--card);border:1px solid rgba(201,168,76,.12)}
#scene-img-wrap{width:100%;height:clamp(180px,28vw,380px);background:var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center}
#scene-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.img-loading{color:var(--muted);font-size:14px;font-style:italic}
.scene-content{padding:36px 44px 28px}
.scene-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:12px}
.scene-label::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.18)}
.speak-ind{display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-size:12px;opacity:0;transition:opacity .3s;margin-left:12px}
.speak-ind.on{opacity:1}
.speak-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:sdot 1s ease-in-out infinite}
.speak-dot:nth-child(2){animation-delay:.18s}.speak-dot:nth-child(3){animation-delay:.36s}
@keyframes sdot{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}
.narration{font-size:clamp(17px,1.9vw,25px);line-height:1.85;color:var(--text);font-weight:300;font-style:italic;margin-bottom:32px;min-height:72px}
.choices-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.14);border-radius:12px;padding:16px 22px;text-align:left;cursor:pointer;color:var(--text);font-family:'Crimson Pro',serif;font-size:clamp(15px,1.7vw,21px);transition:all .22s;display:flex;align-items:center;gap:14px}
.choice-btn .cnum{min-width:30px;height:30px;border-radius:50%;border:1px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);flex-shrink:0}
.choice-btn:hover,.choice-btn.focused{background:rgba(201,168,76,.09);border-color:var(--gold);transform:translateX(8px)}

/* MORAL CARD */
.moral-card{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:18px 22px;margin-bottom:24px;display:none}
.moral-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.moral-text{font-size:clamp(15px,1.6vw,20px);color:var(--text);font-style:italic;line-height:1.6}

/* END */
#screen-end{display:none;text-align:center;animation:fadeIn .8s ease;max-width:700px}
.end-icon{font-size:72px;margin-bottom:28px}
.end-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,52px);color:var(--gold2);margin-bottom:12px}
.end-sub{font-size:clamp(15px,1.8vw,21px);color:var(--muted);font-style:italic;margin-bottom:36px}
.btn-restart{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Crimson Pro',serif;font-size:19px;padding:14px 44px;border-radius:40px;cursor:pointer;transition:all .3s;letter-spacing:1px}
.btn-restart:hover{background:rgba(201,168,76,.1);transform:scale(1.03)}

/* CONTROLLER BADGE */
.ctrl-badge{position:fixed;bottom:20px;right:20px;background:rgba(18,18,26,.92);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:10px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;z-index:100}
.ctrl-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:cdot 2s infinite}
@keyframes cdot{0%,100%{opacity:1}50%{opacity:.2}}

@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="app">

  <div id="screen-list">
    <h1 class="header-title">✦ Storie Interattive ✦</h1>
    <p class="header-sub">Scegli un'avventura e lasciati trasportare</p>
    <div class="stories-grid" id="stories-grid"></div>
  </div>

  <div id="screen-story">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="scene-container">
      <div id="scene-img-wrap"><div class="img-loading">Caricamento scena…</div></div>
      <div class="scene-content">
        <div class="scene-label" id="scene-label">
          Inizio
          <span class="speak-ind" id="speak-ind">
            <span class="speak-dot"></span><span class="speak-dot"></span><span class="speak-dot"></span>
            in lettura…
          </span>
        </div>
        <p class="narration" id="narration"></p>
        <div class="moral-card" id="moral-card">
          <div class="moral-label">✦ La morale di questa storia</div>
          <div class="moral-text" id="moral-text"></div>
        </div>
        <div id="choices-wrap" style="display:none">
          <p class="choices-title">Cosa succede adesso?</p>
          <div class="choices" id="choices"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-end">
    <div class="end-icon">🌟</div>
    <h2 class="end-title">Fine della storia!</h2>
    <p class="end-sub">Che bella avventura insieme</p>
    <button class="btn-restart" onclick="restart()">↩ Torna alle storie</button>
  </div>
</div>

<div class="ctrl-badge">
  <div class="ctrl-dot" id="ctrl-dot"></div>
  <span id="ctrl-text">Apri controller sul telefono</span>
</div>

<script>
/* ===================== DATI STORIE ===================== */
const STORIES = [
  /* ---- 1. IL BOSCO DEI SUSSURRI ---- */
  {
    id:'forest', tag:'Avventura', icon:'🌲',
    title:'Il Bosco dei Sussurri',
    desc:'Una bambina sente voci tra gli alberi durante una passeggiata al tramonto.',
    steps:[
      {
        type:'intro', label:'L\'inizio',
        text:'Era un pomeriggio di ottobre quando Luce si avventurò nel bosco oltre la casa dei nonni. Le foglie rosse e dorate cadevano lente, e nell\'aria c\'era un profumo di terra bagnata e funghi. Ma poi, tra il frusciare delle foglie, sentì qualcosa di insolito: una voce sottile come un filo d\'argento che chiamava il suo nome.',
        keyword:'autumn forest sunset golden leaves',
        choices:[
          {text:'Seguire la voce nel bosco più fitto', key:'deep'},
          {text:'Rispondere ad alta voce e aspettare', key:'wait'},
          {text:'Tornare di corsa dai nonni', key:'run'}
        ]
      },
      {
        type:'middle', label:'Il cuore della storia',
        variants:{
          deep:{
            text:'Luce spinse tra i rami finché non trovò una piccola radura illuminata da una luce dorata. Al centro, seduta su un masso di muschio, c\'era una volpe bianca con gli occhi color ambra. "Finalmente arrivi," disse la volpe. "Ti aspettavo da tre inverni."',
            keyword:'white fox magical clearing golden light forest',
            choices:[
              {text:'Chiederle del messaggio segreto', key:'msg'},
              {text:'Chiederle chi l\'ha mandata', key:'who'},
              {text:'Sedersi in silenzio ad ascoltare', key:'listen'}
            ]
          },
          wait:{
            text:'Dal silenzio emerse un bambino vestito di foglie e ramoscelli, i capelli pieni di terra. "Sono Rowan," disse, "il guardiano di questo bosco. Mi sono perso durante l\'ultima bufera e non ricordo la strada per casa." I suoi occhi erano color di muschio antico.',
            keyword:'forest child lost autumn leaves magic',
            choices:[
              {text:'Promettergli di aiutarlo a trovare la strada', key:'help'},
              {text:'Chiedergli dove abita', key:'where'},
              {text:'Portarlo dai nonni', key:'home'}
            ]
          },
          run:{
            text:'I nonni ascoltarono la storia di Luce con attenzione. Il nonno aprì un vecchio cassetto e tirò fuori una mappa ingiallita. "Anch\'io ho sentito quella voce, quando ero piccolo come te. Il bosco parla solo a chi sa ascoltare davvero."',
            keyword:'old map grandfather cozy kitchen autumn',
            choices:[
              {text:'Guardare la mappa insieme', key:'map'},
              {text:'Chiedere cosa successe al nonno', key:'nonno'},
              {text:'Tornare nel bosco con il nonno', key:'together'}
            ]
          }
        }
      },
      {
        type:'end', label:'Il finale',
        ends:{
          deep_msg:{text:'La volpe le consegnò una piccola pietra luminosa. "Portala sempre con te. Quando ti senti sola, brillerà." Luce tornò a casa stringendo la pietra al petto, sapendo che il bosco sarebbe sempre stato suo amico.', moral:'Chi ascolta con il cuore trova amici in ogni luogo.', keyword:'glowing stone child forest magical light'},
          deep_who:{text:'"Sono la memoria del bosco," disse la volpe. "Ogni albero qui ha una storia da raccontare. Tu sei venuta ad ascoltarle." Quella notte Luce sognò tutte le storie degli alberi, e al mattino sapeva parlare con il vento.', moral:'Le storie degli altri ci rendono più ricchi dentro.', keyword:'child dreaming forest trees stars night'},
          deep_listen:{text:'Nel silenzio, Luce capì tutto senza parole. La volpe sorrise e sparì tra gli alberi. Ma ogni volta che Luce tornava in quel bosco, la radura era lì ad aspettarla, calda e dorata come la prima volta.', moral:'A volte il silenzio ci insegna più di mille parole.', keyword:'peaceful forest clearing golden light autumn'},
          wait_help:{text:'Insieme seguirono le tracce delle radici finché trovarono un grande albero cavo: la casa di Rowan. "Grazie," disse lui. "Senza di te non avrei mai trovato la strada." Da quel giorno Luce e Rowan furono amici per sempre.', moral:'Aiutare gli altri è la cosa più bella che possiamo fare.', keyword:'forest hollow tree child friendship warm light'},
          wait_where:{text:'Rowan indicò una collina lontana dove brillava una luce verde. "Là vive mia nonna, la strega buona del bosco." Lo accompagnarono fino in cima e la nonna abbracciò Rowan tra le lacrime. "Grazie piccola," disse alla bambina.', moral:'Con coraggio e gentilezza si possono compiere grandi imprese.', keyword:'hilltop cottage green light forest child adventure'},
          wait_home:{text:'I nonni di Luce riconobbero subito Rowan: era il nipote della vecchia Marta, la loro vicina di trent\'anni prima. Quella sera cenarono tutti insieme, e il bosco sembrò festeggiare con le sue foglie danzanti.', moral:'Le buone azioni uniscono le famiglie e scalano il tempo.', keyword:'cozy family dinner autumn evening warm kitchen'},
          run_map:{text:'La mappa mostrava un sentiero segreto che portava a una casetta di pietra nel bosco. Ci andarono insieme e trovarono un vecchio libro di fiabe che nessuno leggeva da generazioni. Luce lo lesse ai nonni tutta la sera.', moral:'I tesori più preziosi si trovano solo se si va a cercarli.', keyword:'old cottage stone forest secret path discovery'},
          run_nonno:{text:'Il nonno raccontò di quando aveva incontrato un cervo bianco che parlava. "Non devi avere paura delle voci del bosco, Luce. Sono le storie che cercano qualcuno che le ascolti." Da quel giorno Luce tornò sempre nel bosco.', moral:'I racconti dei nonni sono ponti tra il passato e il futuro.', keyword:'grandfather child storytelling fireplace autumn evening'},
          run_together:{text:'Nonno e Luce entrarono nel bosco di mano. Questa volta la voce li chiamò entrambi. Trovarono una vecchia quercia con due nomi scolpiti: il nonno da bambino e… il nome di Luce. "Lo sapevo," disse lui sorridendo.', moral:'Alcune storie aspettano di essere vissute da due generazioni.', keyword:'ancient oak tree two names carved magical forest light'}
        }
      }
    ]
  },

  /* ---- 2. LA NAVE DEI MILLE ANNI ---- */
  {
    id:'sea', tag:'Mistero', icon:'⚓',
    title:'La Nave dei Mille Anni',
    desc:'Un giovane pescatore trova un relitto che non dovrebbe esistere.',
    steps:[
      {
        type:'intro', label:'L\'inizio',
        text:'Marco aveva pescato in quelle acque tutta la vita, come suo padre e suo nonno prima di lui. Ma quella mattina, immerso nella nebbia più fitta dell\'anno, la prua della sua barca urtò qualcosa di solido. Era uno scafo di legno antico, coperto di barnacoli e alghe, con ancora le vele alzate come se aspettasse un vento che non era mai arrivato.',
        keyword:'mysterious old sailing ship fog ocean',
        choices:[
          {text:'Salire a bordo della nave', key:'board'},
          {text:'Girarle intorno per ispezionarla', key:'look'},
          {text:'Chiamare la guardia costiera', key:'call'}
        ]
      },
      {
        type:'middle', label:'Il cuore della storia',
        variants:{
          board:{
            text:'Il ponte cigolava sotto i suoi piedi. Nella cabina del capitano trovò un diario aperto all\'ultima pagina. La scrittura era chiara, come se fosse stata tracciata il giorno prima: "La tempesta ci ha portati fin qui. Ma non siamo soli su questa nave. C\'è qualcosa che aspetta sotto le assi del ponte."',
            keyword:'old ship cabin lantern captain log book',
            choices:[
              {text:'Aprire il portello sotto coperta', key:'hatch'},
              {text:'Leggere il diario dall\'inizio', key:'read'},
              {text:'Uscire subito dalla nave', key:'escape'}
            ]
          },
          look:{
            text:'Sul fianco dello scafo era inciso il nome "Stella Maris" e sotto, una data: 1743. Impossibile. Eppure la nave galleggiava, le vele erano intatte, e dal boccaporto aperto saliva un filo di fumo, come di un fuoco ancora acceso.',
            keyword:'old ship hull name inscription sea mystery',
            choices:[
              {text:'Avvicinarsi al boccaporto fumante', key:'port'},
              {text:'Cercare testimoni al porto', key:'witness'},
              {text:'Fotografare e cercare archivi storici', key:'photo'}
            ]
          },
          call:{
            text:'La guardia costiera impiegò quaranta minuti. Ma quando arrivarono, la nebbia si era alzata e del relitto non c\'era traccia. Solo Marco aveva visto la nave. Il comandante lo guardò con un sorriso strano: "Non è la prima volta che succede qui."',
            keyword:'coast guard patrol boat sea fog mystery',
            choices:[
              {text:'Chiedere al comandante cosa sa', key:'ask'},
              {text:'Tornare sul posto la notte dopo', key:'return'},
              {text:'Cercare vecchi pescatori del porto', key:'elders'}
            ]
          }
        }
      },
      {
        type:'end', label:'Il finale',
        ends:{
          board_hatch:{text:'Sotto coperta trovò una bambina in abiti d\'epoca che dormiva in un\'amaca. Si svegliò sorridendo: "Aspettavo che qualcuno aprisse quella porta da trecento anni." Sparì all\'alba, lasciando solo un ciondolo d\'argento sul palmo di Marco.', moral:'Chi ha coraggio di aprire porte sconosciute trova ciò che nessuno ha mai trovato.', keyword:'old ship below deck lantern silver pendant mystery'},
          board_read:{text:'Il diario raccontava di un capitano che aveva scelto di restare in mare per proteggere le coste. Marco capì: la nave era ancora lì perché qualcuno doveva finire di leggere la storia. L\'ultima pagina era per lui.', moral:'Ogni storia merita di essere letta fino in fondo.', keyword:'old diary ship captain letter candlelight sea'},
          board_escape:{text:'Appena risalì sulla sua barca, la nave antica si dissolse nella nebbia come zucchero nell\'acqua. Sull\'acqua rimase solo un piccolo forziere di legno. Dentro: una mappa di luoghi che Marco non aveva ancora esplorato.', moral:'A volte la cosa più saggia è saper fermarsi al momento giusto.', keyword:'wooden chest sea map treasure discovery ocean'},
          look_port:{text:'Dal boccaporto sbucò fuori un vecchio gatto rosso che borbottava come se stesse raccontando qualcosa. Marco lo seguì giù per una scaletta e trovò una stiva piena di libri mai letti da nessuno.', moral:'I tesori più grandi sono quelli che nutrono la mente.', keyword:'old ship cat books library lantern golden light'},
          look_witness:{text:'Al porto, una vecchia signora lo riconobbe: "Anche mio padre vide quella nave." Passò tre ore a raccontargli storie del mare che nessuno conosceva più. Quando tornò a casa, Marco cominciò a scrivere.', moral:'Le storie degli anziani sono tesori che non dobbiamo lasciar perdere.', keyword:'old harbor woman storytelling fishing village evening'},
          look_photo:{text:'Negli archivi del municipio trovò una fotografia del 1912 che ritraeva la stessa nave — con suo bisnonno a bordo. Il mare aveva voluto che Marco la ritrovasse, per riconnettere una catena spezzata di famiglia.', moral:'Le radici della famiglia ci raggiungono anche quando non le cerchiamo.', keyword:'old photograph archive harbor family history discovery'},
          call_ask:{text:'Il comandante aprì un cassetto e tirò fuori un registro antico. "Ogni generazione ne vede una diversa. Significa che il mare si fida di te." Da quel giorno Marco divenne il custode di quelle acque, come i suoi avi prima di lui.', moral:'La fiducia si eredita, ma va guadagnata ogni giorno.', keyword:'harbor master old register sea lighthouse duty'},
          call_return:{text:'Quella notte la nave era di nuovo lì, illuminata da mille candele. A bordo c\'erano tutti i capitani che erano venuti prima di Marco. "Benvenuto," dissero in coro. "Sei uno di noi."', moral:'Chi ama il mare porta dentro di sé tutte le generazioni che lo hanno amato prima.', keyword:'ship night candlelight ghostly sea reunion'},
          call_elders:{text:'I vecchi pescatori sapevano. Si passavano la storia da padre in figlio: "La Stella Maris appare quando il mare ha bisogno di un nuovo guardiano." Marco capì. Aveva ereditato qualcosa di più grande di una barca.', moral:'Le tradizioni ci consegnano responsabilità e orgoglio.', keyword:'old fishermen harbor evening lanterns tradition sea'}
        }
      }
    ]
  },

  /* ---- 3. LUNA E IL CRISTALLO DELLA MONTAGNA ---- */
  {
    id:'mountain', tag:'Fantasy · bambini', icon:'🏔️',
    title:'Luna e il Cristallo della Montagna',
    desc:'Una bambina coraggiosa parte alla ricerca di un cristallo magico per salvare la primavera.',
    steps:[
      {
        type:'intro', label:'C\'era una volta…',
        text:'C\'era una volta una bambina di nome Luna che viveva in un piccolo villaggio ai piedi di una grande montagna innevata. Un mattino Luna si svegliò e vide che tutti i fiori erano diventati di ghiaccio, e gli uccellini non cantavano più. La fata del villaggio le disse: "Il Cristallo della Primavera si è spento lassù sulla montagna. Solo un cuore coraggioso può riaccenderlo!" Luna prese il suo zaino colorato e partì.',
        keyword:'cute cartoon snowy mountain village child adventure illustration',
        choices:[
          {text:'Seguire il sentiero dei fiori di ghiaccio', key:'flowers'},
          {text:'Chiedere aiuto all\'orso del bosco', key:'bear'},
          {text:'Seguire una stella luminosa nel cielo', key:'star'}
        ]
      },
      {
        type:'middle', label:'Nel mezzo del viaggio',
        variants:{
          flowers:{
            text:'I fiori di ghiaccio la portarono fino a una cascata congelata bellissima, dove abitava una fatina blu di nome Gelo. "Io ho raffreddato il cristallo per sbaglio!" disse Gelo con le lacrime agli occhi. "Volevo fare una sorpresa, ma ho esagerato con la neve." Luna le prese la manina: "Non piangere. Lo sistemiamo insieme!"',
            keyword:'cute cartoon ice fairy frozen waterfall mountain child illustration',
            choices:[
              {text:'Scaldarla con un abbraccio caldo', key:'hug'},
              {text:'Cantare una canzone della primavera', key:'sing'},
              {text:'Costruire insieme un fuoco di stelle', key:'fire'}
            ]
          },
          bear:{
            text:'L\'orso si chiamava Bernardo e aveva un naso enorme e buffo sempre pieno di miele. "So dove sta il cristallo!" disse, e la caricò sulla schiena. Salirono su per i sentieri innevati finché non trovarono una grotta tappezzata di ghiaccioli luccicanti. "È qui dentro," bisbigliò Bernardo.',
            keyword:'cute cartoon bear child riding mountain snow adventure illustration',
            choices:[
              {text:'Entrare nella grotta con la torcia', key:'torch'},
              {text:'Chiamare il cristallo con voce gentile', key:'call'},
              {text:'Lasciare miele all\'ingresso come regalo', key:'honey'}
            ]

/* ===================== STATO ===================== */
let story=null, stepIdx=0, choice1=null, choice2=null;

/* ===================== STELLE ===================== */
function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${(Math.random()*2+.5).toFixed(1)}px;height:${(Math.random()*2+.5).toFixed(1)}px;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s`;
    c.appendChild(s);
  }
}

/* ===================== LISTA ===================== */
function renderList(){
  document.getElementById('stories-grid').innerHTML=STORIES.map((s,i)=>`
    <div class="story-card" onclick="startStory('${s.id}')" id="sc${i}">
      <span class="story-icon">${s.icon}</span>
      <span class="story-tag">${s.tag}</span>
      <h3 class="story-title">${s.title}</h3>
      <p class="story-desc">${s.desc}</p>
      <span class="story-arrow">→</span>
    </div>`).join('');
}

/* ===================== STORIA ===================== */
function startStory(id){
  story=STORIES.find(s=>s.id===id);
  stepIdx=0;choice1=null;choice2=null;
  show('screen-story');
  renderStep();
}

function renderStep(){
  const step=story.steps[stepIdx];
  document.getElementById('prog').style.width=(stepIdx/story.steps.length*100)+'%';
  document.getElementById('moral-card').style.display='none';
  document.getElementById('choices-wrap').style.display='none';

  let text,keyword;

  if(step.type==='intro'){
    text=step.text; keyword=step.keyword;
    setLabel(step.label);
    loadImg(keyword);
    speak(text,()=>showChoices(step.choices));
  } else if(step.type==='middle'){
    const v=step.variants[choice1]||step.variants[Object.keys(step.variants)[0]];
    text=v.text; keyword=v.keyword;
    setLabel(step.label);
    loadImg(keyword);
    speak(text,()=>showChoices(v.choices));
  } else {
    /* END */
    const key=choice1+'_'+choice2;
    const e=step.ends[key]||step.ends[Object.keys(step.ends)[0]];
    text=e.text; keyword=e.keyword;
    setLabel(step.label);
    loadImg(keyword);
    speak(text,()=>{
      document.getElementById('prog').style.width='100%';
      document.getElementById('moral-text').textContent=e.moral;
      document.getElementById('moral-card').style.display='block';
      setTimeout(showEnd,6000);
    });
  }
  document.getElementById('narration').textContent=text;
}

function setLabel(lbl){
  document.getElementById('scene-label').childNodes[0].textContent=lbl+' ';
}

function showChoices(choices){
  const cc=document.getElementById('choices');
  cc.innerHTML=choices.map((c,i)=>`
    <button class="choice-btn" onclick="pick('${c.key}',${stepIdx})">
      <span class="cnum">${i+1}</span><span>${c.text}</span>
    </button>`).join('');
  document.getElementById('choices-wrap').style.display='block';
}

function pick(key,si){
  if(si===0) choice1=key; else choice2=key;
  document.getElementById('choices-wrap').style.display='none';
  stepIdx++;
  if(stepIdx<story.steps.length) setTimeout(renderStep,350);
}

function showEnd(){
  stopSpeak();
  show('screen-end');
}

function restart(){
  story=null;choice1=null;choice2=null;stepIdx=0;
  show('screen-list');
}

function show(id){
  ['screen-list','screen-story','screen-end'].forEach(s=>{
    document.getElementById(s).style.display=s===id?(s==='screen-list'?'block':'block'):'none';
  });
}

/* ===================== IMMAGINI ===================== */
function loadImg(keyword){
  const w=document.getElementById('scene-img-wrap');
  w.innerHTML='<div class="img-loading">Caricamento scena…</div>';
  const img=new Image();
  /* Unsplash random con keyword */
  img.src=`https://source.unsplash.com/1600x500/?${encodeURIComponent(keyword)}`;
  img.onload=()=>{ w.innerHTML=''; img.alt='Scena'; w.appendChild(img); };
  img.onerror=()=>{ w.innerHTML=`<div class="img-loading">🌄 ${keyword}</div>`; };
}

/* ===================== VOCE ===================== */
let synth=window.speechSynthesis;
function speak(text,cb){
  stopSpeak();
  if(!synth){if(cb)cb();return;}
  document.getElementById('speak-ind').classList.add('on');
  const u=new SpeechSynthesisUtterance(text);
  u.lang='it-IT';u.rate=0.87;u.pitch=1.08;
  const vs=synth.getVoices();
  const ita=vs.find(v=>v.lang.startsWith('it'));
  if(ita) u.voice=ita;
  u.onend=()=>{document.getElementById('speak-ind').classList.remove('on');if(cb)cb();};
  synth.speak(u);
}
function stopSpeak(){ synth&&synth.cancel(); document.getElementById('speak-ind').classList.remove('on'); }
if(synth) synth.onvoiceschanged=()=>synth.getVoices();

/* ===================== CONTROLLER via BroadcastChannel ===================== */
/* Usa BroadcastChannel (funziona su stesso browser/origin) come fallback locale */
let bc;
try{
  bc=new BroadcastChannel('storie-interattive');
  bc.onmessage=(e)=>{
    const d=e.data;
    if(d.action==='start') startStory(d.id);
    if(d.action==='pick') pick(d.key,d.si);
    if(d.action==='restart') restart();
    document.getElementById('ctrl-text').textContent='Controller attivo ✓';
    document.getElementById('ctrl-dot').style.background='#4caf50';
  };
}catch(err){}

makeStars();
renderList();
</script>
